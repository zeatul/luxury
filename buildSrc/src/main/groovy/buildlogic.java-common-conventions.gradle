

plugins {
    id 'java'
    id 'maven-publish'
    id 'signing'
}


java {
     sourceCompatibility =  1.8
     targetCompatibility =  1.8

    toolchain {
        languageVersion.set(JavaLanguageVersion.of(8))
    }

    withJavadocJar() //with java doc
    withSourcesJar() //with java source
}

dependencies {
    testImplementation libs.junit.jupiter
    testImplementation libs.assertj.core
    testRuntimeOnly libs.junit.platform.launcher
}

tasks.named('test') {
    useJUnitPlatform()
}

tasks.withType(Javadoc).configureEach {
    options.addStringOption('Xdoclint:-missing', '-quiet')
    options.encoding = 'utf-8'
}

tasks.withType(JavaCompile) {
    options.compilerArgs << "-Xlint:-options"
    // options.compilerArgs << "-Xlint:deprecation" << "-Xlint:unchecked"
    // sourceCompatibility = "${JavaVersion.VERSION_1_8}"
    // targetCompatibility = "${JavaVersion.VERSION_1_8}"
}

publishing {
    publications {
        myLibrary(MavenPublication) {
            from components.java
            project.afterEvaluate {
                pom {
                    name = project.name
                    description = project.description
                    url = 'https://github.com/zeatul/hawk-framework'
                    licenses {
                        license {
                            name = 'Apache-2.0'
                            url = 'https://opensource.org/licenses/Apache-2.0'
                        }
                    }
                    developers {
                        developer {
                            name = 'Hawk'
                            email = 'zeatul@qq.com'
                        }
                    }
                    scm {
                        connection = 'scm:git:git://github.com/zeatul/hawk-framework.git'
                        developerConnection = 'scm:git:git@github.com:zeatul/hawk-framework.git'
                        url = 'https://github.com/zeatul/hawk-framework'
                    }
                }
            }
        }
    }

    // The repository for publications is defined in the init.gradle file.
    repositories {
        mavenLocal()
    }
}

signing {
    required { !version.endsWith("SNAPSHOT") && gradle.taskGraph.hasTask("publish") }
    sign publishing.publications.myLibrary
}

